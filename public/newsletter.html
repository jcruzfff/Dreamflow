        /* Basic Styling */

        @font-face {
        font-family: "Helvetica Bold";

*,
body,
html {
    font-family: "Helvetica Neue", "Plus Jakarta Sans"
}
body {
    background-color: #101018;/* Background color black */
    color: #fff; /* Font color white */
    margin: 0;
    overflow: hidden;
    position: relative;
}

#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    background-image: url("");
    background-size: cover;
    background-position: center;
    z-index: -4
}

.count-particles {
    background: #002;
    position: absolute;
    top: 48px;
    left: 0;
    width: 80px;
    color: #13e8e9;
    font-size: .8em;
    text-align: left;
    text-indent: 4px;
    line-height: 14px;
    padding-bottom: 2px;
    font-family: "Helvetica Neue";
    font-weight: 700
}



/* Welcome Section */
.newsletter-section {
    display: flex;
    flex-direction: row;
    align-items: center; /* Center alignment for the welcome section */
    text-align: left;
    justify-content: center;
    width: 100%;
    justify-content: center;
    height: 100vh; /* Full viewport height to center vertically */
    box-sizing: border-box;
    padding-left: 100px;
}


.newsletter-section p {
    margin-bottom: 48px;
    width: 86%;
    text-align: left;
    color: #ffffff;
    font-size: 20px;
    font-weight: 400;
    line-height: 120%;
    box-sizing: border-box;
}

.newsletter-content{
    display: flex;
    flex-direction: column;
    width: 50%;
    text-align: left;
    height: 100%;
    box-sizing: border-box;
    padding-right: 80px;
    justify-content: center;
    
}

.newsletter-buttons{
    display: flex;
    position: relative;
    width: 100%;
    max-width: 528px;
}

.go-btn{
    position: absolute;
    z-index: 1000;
    padding: 0 32px;
    font-size: 20px;
    background-color: #fff;
    color: #000;
    border: none;
    border-radius: 42px;
    cursor: pointer;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    height: calc(100% - 12px); /* Height of button is input height minus 12px for 6px gap on top and bottom */
    display: flex;
    justify-content: center;
    align-items: center;
}


#newsletter-header {
    position: relative;
    margin-bottom: 24px;
    width: fit-content;
    display: flex;

    background: radial-gradient(41% 80% at 50% 50%, #fff 42%, rgba(255, 255, 255, .4) 100%);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-align: center;
    font-family: "Helvetica Neue";
    font-size: 72px;
    font-style: normal;
    font-weight: 500;
    line-height: 100%; /* 92px */
    letter-spacing: -3px;
    box-sizing: border-box;
    text-align: left;   
    max-width: 628px;
}



.email-input {
    display: flex;
    position: relative;
    align-items: center;
    cursor: pointer;
    border: 1px solid #242424;
    border-radius: 48px;
    padding: 6px 6px 6px 32px;
    width: 100%;
    background-color: rgba(255, 255, 255, 0.01);
    font-size: 20px;
    box-sizing: border-box;
    height: 68px; /* Set a fixed height to accommodate the button */
    flex: 1;
    color: white;
    z-index: 1000;
   
}

.email-input:focus{
    background-color: rgba(255, 255, 255, 0.03);
    box-shadow: 0px -2px 19px 5px rgba(255, 255, 255, 0.06) inset;
    backdrop-filter: blur(33.75px);
    border: 1px solid #242424;
    outline: none; /* Remove default focus outline */
}

.email-input::placeholder {
    color: #ffffff; /* Gray subtext color */
    /* Full opacity for the placeholder */
}

/* Remove Placeholder on Focus */
.email-input:focus::placeholder {
    color: transparent; /* Make the placeholder transparent on focus */
}

.bottom-image {
    position: fixed;
    z-index: 0;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 0;
}

.bottom-image img {
    position: fixed;
    bottom: 0px;
    width: 100%;
    height: auto;
}


.error-message {
    color: #ff4c4c; /* Red for error message */
    font-size: 16px;
    margin-top: 10px;
    display: none; /* Hidden by default */
}

.success-message {
    color: #ffffff; 
    font-size: 20px;
    margin-top: 10px;
    display: none; /* Hidden by default */
    transition: opacity 0.3s ease; /* Smooth transition for opacity changes */
}

/* Media Queries for Responsiveness */

/* Large tablets and small desktops */
@media screen and (max-width: 1200px) {
    .newsletter-section {
        padding-left: 50px;
        padding-right: 50px;
    }

    .newsletter-content {
        width: 50%;
        padding-right: 50px;
    }

    #newsletter-header {
        font-size: 64px;
    }

    .newsletter-section p {
        font-size: 18px;
    }
}

/* Tablets and large mobile phones */
@media screen and (max-width: 992px) {
    .newsletter-section {
        flex-direction: column;
        padding: 50px 30px;
        height: auto;
    }
    .newsletter-section p {
        width: 100%;
        text-align: center;
    }

    .newsletter-content {
        width: 100%;
        padding-right: 0;
        margin-bottom: 50px;
    }

    .newsletter-image {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .newsletter-image img {
        max-width: 100%;
        height: auto;
    }

    #newsletter-header {
        font-size: 56px;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
    }

    .newsletter-subheader {
        text-align: center;
        font-size: 18px;
        width: 100%;
    }

    .newsletter-buttons {
        width: 100%;
    }
}

/* Small mobile phones */
@media screen and (max-width: 576px) {

        padding: 30px 20px;
    }

    #newsletter-header {
        font-size: 40px;
    }

    .newsletter-subheader {

    }

    .email-input {
        font-size: 18px;
        height: 60px;
    }

    .go-btn {
        font-size: 18px;
        padding: 0 20px;
    }
}

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const emailInput = document.querySelector('.email-input');
        const goBtn = document.querySelector('.go-btn');
        const errorMessage = document.querySelector('.error-message');
        const successMessage = document.querySelector('.success-message');
        const newsletterButtons = document.querySelector('.newsletter-buttons');

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            newsletterButtons.style.display = 'none'; // Hide the newsletter buttons
        }

        function animateSuccessMessage() {
            let dots = '';
            let count = 0;
            let opacity = 0;
            successMessage.style.opacity = '0';
            const interval = setInterval(() => {
                dots += '.';
                count++;
                if (count > 3) {
                    dots = '';
                    count = 0;
                }
                opacity = Math.min(opacity + 0.1, 1);
                successMessage.style.opacity = opacity;
                successMessage.textContent = `Thank you for subscribing! Redirecting to Dreamline${dots}`;
            }, 300);

            return interval;
        }

        function handleSubmit() {
            const email = emailInput.value.trim();

            if (!email) {
                showError('Email is required');
            } else if (!validateEmail(email)) {
                showError('Please enter a valid email address');
            } else {
                showSuccess('Thank you for subscribing! Redirecting to Dreamline');
                // Here you would typically send the email to your server
                // For example: sendEmailToServer(email);
                
                const animationInterval = animateSuccessMessage();
                
                // Redirect after 2500ms
                setTimeout(() => {
                    clearInterval(animationInterval);
                    window.location.href = 'intake.html';
                }, 3000);
            }
        }

        goBtn.addEventListener('click', handleSubmit);

        emailInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent form submission if within a form
                handleSubmit();
            }
        });

        emailInput.addEventListener('input', function() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        });
    });
</script>
